<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ulisse Poggioni</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1e1e1e;
    --surface: #2a2a2a;
    --border: #3d3d3d;
    --text: #e8e4dc;
    --text-user: #f0a0b8;
    --text-dim: #888580;
    --text-label: #666260;
    --accent: #c8b890;
    --mono: 'DM Mono', monospace;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.6;
  }

  .page {
    max-width: 640px;
    margin: 0 auto;
    padding: 48px 24px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .header-img {
    width: 100%;
    aspect-ratio: 4 / 3;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .header-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .chat {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .message {
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(3px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message-header {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .message-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .message-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .message-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-label);
  }

  .message-body {
    font-size: 13px;
    line-height: 1.8;
    color: var(--text);
  }

  .message-body.user-body {
    color: var(--text-user);
  }

  .message-body a {
    color: #e6c84a;
    text-decoration: underline;
    text-underline-offset: 3px;
    transition: opacity 0.2s;
  }

  .message-body a:hover {
    opacity: 0.75;
  }

  .kw {
    color: #7ec98a;
  }

  .message-body ul {
    margin: 8px 0 8px 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .message-body li {
    list-style: disc;
    padding-left: 4px;
  }

  /* Inline image */
  .inline-image {
    margin-top: 12px;
    border: 1px solid var(--border);
    display: inline-block;
    max-width: 320px;
    cursor: zoom-in;
  }

  .inline-image img {
    width: 100%;
    display: block;
    transition: opacity 0.2s;
  }

  .inline-image:hover img {
    opacity: 0.85;
  }

  .inline-image-caption {
    padding: 6px 10px;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    border-top: 1px solid var(--border);
  }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }

  .lightbox.open {
    display: flex;
  }

  .lightbox img {
    max-width: 92vw;
    max-height: 92vh;
    object-fit: contain;
    border: 1px solid var(--border);
  }

  /* Cursor */
  .cursor {
    display: inline-block;
    width: 7px;
    height: 13px;
    background: var(--text);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  /* Loading animation */
  .loading-gif {
    width: 150px;
    height: 150px;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--border);
    margin: 4px 0;
  }

  .loading-gif img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .loading-wrap {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 4px 0;
  }

  .loading-label {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    font-style: italic;
  }

  /* Typing dots fallback */
  .typing {
    display: flex;
    gap: 5px;
    padding: 4px 0;
    align-items: center;
  }

  .typing span {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: dot 1.2s ease-in-out infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot {
    0%, 100% { opacity: 0.2; transform: translateY(0); }
    50%       { opacity: 1;   transform: translateY(-2px); }
  }

  .divider {
    width: 100%;
    height: 1px;
    background: var(--border);
  }

  .input-area {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .input-wrapper {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    border: 1px solid var(--border);
    padding: 10px 14px;
    background: var(--surface);
    transition: border-color 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: var(--accent);
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 16px;
    line-height: 1.6;
    resize: none;
    max-height: 120px;
    min-height: 20px;
  }

  #user-input::placeholder {
    color: var(--text-dim);
  }

  #send-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 5px 11px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  #send-btn:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
  }

  #send-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .input-hint {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  .prompt-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }

  .prompt-pill {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .prompt-pill:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  @media (max-width: 480px) {
    .page { padding: 32px 16px 48px; gap: 24px; }
    #user-input { font-size: 16px; }
  }
</style>
</head>
<body>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="">
</div>

<div class="page">

  <div class="header-img">
    <img src="/img/header.jpg" alt="Ulisse Poggioni">
  </div>

  <div class="chat" id="chat"></div>

  <div class="divider"></div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea
        id="user-input"
        placeholder="scrivi qualcosa..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()">invia</button>
    </div>
    <div class="input-hint">↵ invio &nbsp;·&nbsp; shift+↵ nuova riga</div>
  </div>

</div>

<script>
const IMAGES = {
  'coro':    { src: '/img/coro.jpg',    caption: 'Un Coro del Pigneto' },
  'ep':      { src: '/img/ep.jpg',      caption: 'EP "Musica da camera"' },
  'motion':  { src: '/img/motion.jpg',  caption: 'Motion graphics' },
  'ritratto':{ src: '/img/ritratto.jpg',caption: 'Ulisse Poggioni' },
};

const LOADING_GIFS = [
  '/img/profili/p1.gif',
  '/img/profili/p2.gif',
  '/img/profili/p3.gif',
  '/img/profili/p4.gif',
  '/img/profili/p5.gif',
];

const PROFILE_IMG = '/img/profilo.jpg';

const OPENING = `Ciao, sono un'AI con fenomenali poteri cosmici ridotta a rispondere a domande su questo Ulisse Poggioni. Chiedimi pure quello che vuoi, che lavoro fa, cosa ha studiato, le sue competenze. Oppure dimmi di cosa ti occupi tu e partiamo da lì, che dici?`;

const PROMPT_SUGGESTIONS = [
  'Chi è Ulisse Poggioni?',
  'Che sta succedendo? Come funziona questa cosa?',
];

let history = [];
let isLoading = false;

function randomGif() {
  return LOADING_GIFS[Math.floor(Math.random() * LOADING_GIFS.length)];
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendPrompt(text) {
  document.getElementById('user-input').value = text;
  sendMessage();
}

function scrollBottom() {
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function extractImages(text) {
  const keys = [];
  text.replace(/\[IMG:([^\]]+)\]/g, (_, k) => keys.push(k.trim()));
  return keys;
}

function stripImageTags(text) {
  return text.replace(/\[IMG:[^\]]+\]/g, '').trim();
}

function renderHTML(text) {
  let t = stripImageTags(text);

  // Convert bullet list blocks (lines starting with -)
  const lines = t.split('\n');
  const out = [];
  let inList = false;
  for (const line of lines) {
    if (line.startsWith('- ')) {
      if (!inList) { out.push('<ul>'); inList = true; }
      out.push('<li>' + line.slice(2) + '</li>');
    } else {
      if (inList) { out.push('</ul>'); inList = false; }
      out.push(line);
    }
  }
  if (inList) out.push('</ul>');
  t = out.join('\n');

  t = t
    .replace(/\[k\](.*?)\[\/k\]/g, '<span class="kw">$1</span>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/

/g, '</p><p>')
    .replace(/
/g, '<br>');

  return '<p>' + t + '</p>';
}

function appendImages(msgEl, keys) {
  keys.forEach(key => {
    const img = IMAGES[key];
    if (!img) return;
    const block = document.createElement('div');
    block.className = 'inline-image';
    block.innerHTML = `<img src="${img.src}" alt="${img.caption}" loading="lazy"><div class="inline-image-caption">${img.caption}</div>`;
    block.addEventListener('click', () => openLightbox(img.src));
    msgEl.appendChild(block);
  });
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});

function addMessage(role, content, instant) {
  const chat = document.getElementById('chat');
  const msg = document.createElement('div');
  msg.className = 'message';

  const header = document.createElement('div');
  header.className = 'message-header';

  if (role === 'assistant') {
    const avatarWrap = document.createElement('div');
    avatarWrap.className = 'message-avatar';
    avatarWrap.innerHTML = `<img src="${PROFILE_IMG}" alt="Botfolio">`;
    header.appendChild(avatarWrap);
  }

  const label = document.createElement('div');
  label.className = 'message-label';
  label.textContent = role === 'user' ? 'tu' : 'botfolio';
  header.appendChild(label);

  const body = document.createElement('div');
  body.className = 'message-body' + (role === 'user' ? ' user-body' : '');

  msg.appendChild(header);
  msg.appendChild(body);
  chat.appendChild(msg);
  scrollBottom();

  if (role === 'assistant' && !instant) {
    return typewrite(body, msg, content);
  } else {
    body.innerHTML = renderHTML(content);
    appendImages(msg, extractImages(content));
    scrollBottom();
    return Promise.resolve();
  }
}

function typewrite(el, msgEl, rawText) {
  return new Promise(resolve => {
    const imageKeys = extractImages(rawText);

    el.innerHTML = renderHTML(rawText);

    const words = [];
    function wrapWords(node) {
      if (node.nodeType === Node.TEXT_NODE) {
        const frag = document.createDocumentFragment();
        node.textContent.split(/(\s+)/).forEach(part => {
          if (/^\s+$/.test(part)) {
            frag.appendChild(document.createTextNode(part));
          } else if (part.length > 0) {
            const span = document.createElement('span');
            span.className = 'tw-word';
            span.textContent = part;
            span.style.opacity = '0';
            words.push(span);
            frag.appendChild(span);
          }
        });
        node.parentNode.replaceChild(frag, node);
      } else if (node.nodeType === Node.ELEMENT_NODE && node.tagName !== 'SCRIPT') {
        Array.from(node.childNodes).forEach(wrapWords);
      }
    }
    wrapWords(el);

    let i = 0;
    const delay = 38;

    function revealNext() {
      if (i < words.length) {
        words[i].style.opacity = '1';
        i++;
        scrollBottom();
        setTimeout(revealNext, delay);
      } else {
        el.innerHTML = renderHTML(rawText);
        appendImages(msgEl, imageKeys);
        scrollBottom();
        resolve();
      }
    }

    revealNext();
  });
}

function addTypingIndicator() {
  const chat = document.getElementById('chat');
  const el = document.createElement('div');
  el.id = 'typing-indicator';
  el.className = 'message';
  const gifSrc = randomGif();
  el.innerHTML = `
    <div class="message-header">
      <div class="message-avatar"><img src="${PROFILE_IMG}" alt="Botfolio"></div>
      <div class="message-label">botfolio</div>
    </div>
    <div class="loading-wrap">
      <div class="loading-gif"><img src="${gifSrc}" alt=""></div>
      <div class="loading-label">ci sto pensando</div>
    </div>
  `;
  chat.appendChild(el);
  scrollBottom();
}

function removeTypingIndicator() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function addPromptPills() {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.id = 'prompt-pills';
  wrap.className = 'prompt-pills';
  PROMPT_SUGGESTIONS.forEach(text => {
    const btn = document.createElement('button');
    btn.className = 'prompt-pill';
    btn.textContent = text;
    btn.onclick = () => { removePills(); sendPrompt(text); };
    wrap.appendChild(btn);
  });
  chat.appendChild(wrap);
  scrollBottom();
}

function removePills() {
  const el = document.getElementById('prompt-pills');
  if (el) el.remove();
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  removePills();
  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  addMessage('user', text, true);
  history.push({ role: 'user', content: text });
  addTypingIndicator();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });
    const data = await res.json();
    removeTypingIndicator();
    const reply = data.error ? 'Si è verificato un errore. Riprova.' : data.content[0].text;
    await addMessage('assistant', reply);
    history.push({ role: 'assistant', content: reply });
  } catch (err) {
    removeTypingIndicator();
    await addMessage('assistant', 'Errore di connessione. Riprova.');
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

window.addEventListener('load', async () => {
  await addMessage('assistant', OPENING);
  addPromptPills();
});
</script>
</body>
</html>
