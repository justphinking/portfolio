<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ulisse Poggioni</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #213546;
    --surface: #1e2f3e;
    --border: #2e4557;
    --border-strong: #b23979;
    --text: #86a3b3;
    --text-user: #ff5b8c;
    --text-muted: #5a7a8e;
    --text-dim: #3a5568;
    --text-label: #3a5568;
    --accent: #ffffff;
    --line-ai: #2e4557;
    --text-font: 'Lora', serif;
    --ui-font: 'DM Sans', sans-serif;
  }

  html, body {
    min-height: 100%;
    background: linear-gradient(
      to bottom,
      #b23979 calc((100vw - 48px) * 2 / 3 - 80px),
      #213546 calc((100vw - 48px) * 2 / 3 + 80px)
    );
    color: var(--text);
    font-family: var(--text-font);
    font-size: 14px;
    line-height: 1.6;
  }

  @media (min-width: 640px) {
    html, body {
      background: linear-gradient(
        to bottom,
        #b23979 calc(427px - 80px),
        #213546 calc(427px + 80px)
      );
      }
  }

  .page {
    max-width: 640px;
    margin: 0 auto;
    padding: 48px 24px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    position: relative;
    z-index: 1;
  }

  .header-img {
    width: 100%;
    aspect-ratio: 4 / 3;
    overflow: hidden;
  }

  .contact-icons {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    width: 100%;
    margin-top: -8px;
  }

  .contact-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(33,53,70,0.7);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: var(--text-muted);
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .contact-icon:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .contact-icon svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
  }

  .header-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .chat {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .message {
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(3px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message-header {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .message-header.user-header {
    justify-content: flex-end;
  }

  .message-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .message-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .message-label {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-family: var(--ui-font);
    font-weight: 500;
  }

  .message-body {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    border-left: 1px solid var(--line-ai);
    padding-left: 14px;
  }

  .message-body p { margin-bottom: 0.65em; }
  .message-body p:last-child { margin-bottom: 0; }

  .message-body.user-body {
    color: var(--text-user);
    border-left: none;
    padding-left: 0;
    border-right: 1px solid var(--accent);
    padding-right: 14px;
    text-align: right;
  }

  .message-body a {
    color: #6abf7a;
    text-decoration: underline;
    text-underline-offset: 3px;
    transition: opacity 0.2s;
  }

  .message-body a:hover { opacity: 0.7; }

  .message-body a.contact,
  .contact { color: #dc894a; }

  .kw { font-weight: 700; color: #ffffff; }

  /* Inline Lottie animation */
  .inline-anim {
    margin-top: 12px;
    width: 100%;
    aspect-ratio: 1 / 1;
    max-width: 320px;
    display: block;
  }

  /* Slider */
  .slider-block {
    margin-top: 14px;
    width: 100%;
  }

  .slider-track {
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border);
    aspect-ratio: 1 / 1;
    background: var(--surface);
  }

  .slider-track-wrap {
    position: relative;
  }

  .slider-track img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.4s ease;
    cursor: zoom-in;
  }

  .slider-track img.active { opacity: 1; }

  .slider-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 0 0;
    gap: 8px;
  }

  .slider-btn {
    background: rgba(0,0,0,0.55);
    border: 1.5px solid rgba(255,255,255,0.7);
    color: rgba(255,255,255,0.9);
    font-size: 16px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 2;
  }

  .slider-btn:hover { background: rgba(0,0,0,0.8); }
  .slider-btn.prev { left: 8px; }
  .slider-btn.next { right: 8px; }

  .slider-dots {
    display: flex;
    gap: 7px;
    align-items: center;
    justify-content: center;
  }

  .slider-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--border);
    cursor: pointer;
    transition: background 0.2s;
  }

  .slider-dot.active { background: var(--accent); }

  .slider-counter {
    font-family: var(--ui-font);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  .slider-caption {
    margin-top: 10px;
    font-family: var(--ui-font);
    font-size: 12px;
    line-height: 1.6;
    color: var(--text-muted);
  }

  /* Inline image */
  .inline-image {
    margin-top: 12px;
    display: block;
    width: 100%;
    cursor: zoom-in;
  }

  .inline-image img {
    width: 100%;
    display: block;
    transition: opacity 0.2s;
  }

  .inline-image:hover img { opacity: 0.85; }

  .inline-image-caption {
    font-family: var(--ui-font);
    padding: 6px 0;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  /* Image grid */
  .image-grid {
    margin-top: 14px;
    width: 100%;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  .image-grid-item {
    cursor: zoom-in;
    display: block;
    width: 100%;
  }

  .image-grid-item img {
    width: 100%;
    height: auto;
    display: block;
    transition: opacity 0.2s;
  }

  .image-grid-item:hover img { opacity: 0.8; }

  /* Video cover */
  .video-cover {
    margin-top: 12px;
    display: block;
    width: 100%;
    position: relative;
    cursor: pointer;
  }

  .video-cover img {
    width: 100%;
    display: block;
    transition: opacity 0.2s;
  }

  .video-cover:hover img { opacity: 0.8; }

  .video-play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    border: 2px solid rgba(255,255,255,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    transition: background 0.2s;
  }

  .video-cover:hover .video-play-btn { background: rgba(0,0,0,0.85); }

  .video-play-btn::after {
    content: '';
    display: block;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 10px 0 10px 18px;
    border-color: transparent transparent transparent rgba(255,255,255,0.95);
    margin-left: 4px;
  }

  .video-caption {
    font-family: var(--ui-font);
    padding: 6px 0;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  /* Video lightbox */
  .lightbox-video {
    position: relative;
    width: 90vw;
    max-width: 960px;
    aspect-ratio: 16 / 9;
  }

  .lightbox-video iframe,
  .lightbox-video video {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    z-index: 1000;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .lightbox.open { display: flex; }

  .lightbox img {
    max-width: 82vw;
    max-height: 88vh;
    object-fit: contain;
    border: 1px solid var(--border);
  }

  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 20px;
    width: 40px;
    height: 40px;
    cursor: pointer;
    transition: all 0.2s;
    z-index: 1001;
  }

  .lightbox-nav:hover { border-color: var(--accent); color: var(--accent); }
  #lb-prev { left: 20px; }
  #lb-next { right: 20px; }

  .lightbox-close {
    position: absolute;
    top: 16px;
    right: 20px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 16px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    transition: all 0.2s;
    z-index: 1001;
  }

  .lightbox-close:hover { border-color: var(--accent); color: var(--accent); }

  /* Loading */
  .loading-lottie {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.5);
    margin: 4px 0;
    flex-shrink: 0;
  }

  .loading-wrap {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 4px 0;
  }

  .loading-label {
    font-family: var(--ui-font);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    font-style: italic;
  }

  /* Divider */
  .divider {
    width: 100%;
    height: 1px;
    background: var(--border);
  }

  /* Input */
  .input-area {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .input-wrapper {
    display: flex;
    align-items: stretch;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    transition: border-color 0.2s;
  }

  .input-wrapper:focus-within { border-color: var(--accent); }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--text-font);
    font-size: 15px;
    line-height: 1.6;
    resize: none;
    max-height: 120px;
    min-height: 20px;
    padding: 10px 14px;
  }

  #user-input::placeholder { color: var(--text-dim); }

  #send-btn {
    background: transparent;
    border: none;
    border-left: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--ui-font);
    font-size: 12px;
    letter-spacing: 0.06em;
    padding: 0 16px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  #send-btn:hover:not(:disabled) { background: var(--border); color: var(--text); }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .input-hint {
    font-family: var(--ui-font);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  /* Pills */
  .prompt-pills,
  .suggestion-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }

  .suggestion-pills { margin-top: 12px; }

  .prompt-pill,
  .suggestion-pill {
    background: transparent;
    font-family: var(--ui-font);
    font-size: 12px;
    padding: 5px 14px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    text-align: left;
  }

  .prompt-pill { border: 1px solid var(--border-strong); color: var(--text-muted); }
  .suggestion-pill { border: 1px solid var(--border); color: var(--text-muted); }

  .prompt-pill:hover,
  .suggestion-pill:hover { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 480px) {
    .page { padding: 32px 16px 48px; gap: 24px; }
    #user-input { font-size: 16px; }
  }
</style>
</head>
<svg width="0" height="0" style="position:absolute;pointer-events:none">
  <defs>
    <filter id="bg-grain" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feComponentTransfer in="gray" result="darkened">
        <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
      <feComposite in="darkened" in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>
</svg>

// ── Rendering ────────────────────────────────────────────────────

function renderHTML(text) {
  let t = text;
  // Bullet lines
  t = t.split('\n').map(l => l.startsWith('- ') ? '\u2013 ' + l.slice(2) : l).join('\n');
  t = t
    .replace(/\[k\](.*?)\[\/k\]/g, '<strong class="kw">$1</strong>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    // mailto links
    .replace(/\[([^\]]+)\]\(mailto:([^)]+)\)/g, '<a href="mailto:$2" class="contact">$2</a>')
    // markdown links
    .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, (_, label, url) => {
      const isContact = /instagram\.com/.test(url);
      return `<a href="${url}" target="_blank" rel="noopener"${isContact ? ' class="contact"' : ''}>${label}</a>`;
    })
    // bare URLs not already inside an anchor
    .replace(/(?<!['"=])(https?:\/\/[^\s<"']+)/g, url => {
      const isContact = /instagram\.com/.test(url);
      return `<a href="${url}" target="_blank" rel="noopener"${isContact ? ' class="contact"' : ''}>${url}</a>`;
    })
    // phone numbers
    .replace(/(\+39[\s\d]{8,})/g, '<span class="contact">$1</span>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  return '<p>' + t + '</p>';
}

function extractVideos(text) {

async function buildGrid(name) {
  const srcs = [];
  const exts = ['jpg', 'jpeg', 'png', 'webp'];
  for (let i = 1; i <= 30; i++) {
    let found = false;
    for (const ext of exts) {
      const src = `/img/${name}/${i}.${ext}`;
      try {
        const r = await fetch(src, { method: 'HEAD' });
        if (r.ok) { srcs.push(src); found = true; break; }
      } catch(e) {}
    }
    if (!found) break;
  }
  if (srcs.length === 0) return null;

  const grid = document.createElement('div');
  grid.className = 'image-grid';

  srcs.forEach((src, idx) => {
    const item = document.createElement('div');
    item.className = 'image-grid-item';
    const img = document.createElement('img');
    img.src = src;
    img.loading = 'lazy';
    item.appendChild(img);
    item.addEventListener('click', () => openLightboxAtIndex(src, srcs, idx));
    grid.appendChild(item);
  });

  return grid;
}

async function buildSlider(name, caption) {
  const srcs = [];
  const exts = ['jpg', 'jpeg', 'png', 'gif', 'webp'];
  for (let i = 1; i <= 20; i++) {
    let found = false;
    for (const ext of exts) {
      const src = `/img/${name}/${i}.${ext}`;
      try {
        const r = await fetch(src, { method: 'HEAD' });
        if (r.ok) { srcs.push(src); found = true; break; }
      } catch(e) {}
    }
    if (!found) break;
  }
  if (srcs.length === 0) return null;

  const block = document.createElement('div');
  block.className = 'slider-block';
  const track = document.createElement('div');
  track.className = 'slider-track';

  srcs.forEach((src, idx) => {
    const img = document.createElement('img');
    img.src = src;
    img.loading = 'lazy';
    if (idx === 0) img.classList.add('active');
    img.addEventListener('click', (function(s, idx) { return function() { openLightboxAtIndex(s, srcs, idx); }; })(src, idx));
    track.appendChild(img);
  });

  let current = 0;
  const imgEls = track.querySelectorAll('img');
  const controls = document.createElement('div');
  controls.className = 'slider-controls';
  const prev = document.createElement('button');
  prev.className = 'slider-btn prev'; prev.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="15 18 9 12 15 6"></polyline></svg>';
  const dotsWrap = document.createElement('div');
  dotsWrap.className = 'slider-dots';
  const counter = document.createElement('div');
  counter.className = 'slider-counter';
  counter.textContent = '1 / ' + srcs.length;
  const next = document.createElement('button');
  next.className = 'slider-btn next'; next.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="9 18 15 12 9 6"></polyline></svg>';

  const dots = srcs.map((_, idx) => {
    const d = document.createElement('div');
    d.className = 'slider-dot' + (idx === 0 ? ' active' : '');
    d.addEventListener('click', () => goTo(idx));
    dotsWrap.appendChild(d);
    return d;
  });

  function goTo(n) {
    imgEls[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = (n + srcs.length) % srcs.length;
    imgEls[current].classList.add('active');
    dots[current].classList.add('active');
    counter.textContent = (current + 1) + ' / ' + srcs.length;
  }

  prev.addEventListener('click', () => goTo(current - 1));
  next.addEventListener('click', () => goTo(current + 1));
  track.appendChild(prev);
  track.appendChild(next);
  controls.append(dotsWrap, counter);
  block.append(track, controls);

  // Swipe support
  let swipeStartX = 0;
  track.addEventListener('touchstart', e => { swipeStartX = e.touches[0].clientX; }, { passive: true });
  track.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - swipeStartX;
    if (Math.abs(dx) < 40) return;
    dx < 0 ? goTo(current + 1) : goTo(current - 1);
  }, { passive: true });
  if (caption) {
    const cap = document.createElement('div');
    cap.className = 'slider-caption';
    cap.innerHTML = caption;
    block.appendChild(cap);
  }
  return block;
}

function buildSuggestions(questions) {

// ── Streaming renderer ───────────────────────────────────────────

async function streamAssistantMessage(reader) {
  const { msg } = createMessageShell('assistant');
  // Remove the empty body div — we build nodes inline
  const emptyBody = msg.querySelector('.message-body');
  if (emptyBody) emptyBody.remove();

  let buffer = '';
  let currentTextDiv = null;
  let currentChunk = '';
  let fullHistory = '';
  let userScrolled = false;
  let mediaJustInserted = false;

  const onScroll = () => {
    userScrolled = (document.body.scrollHeight - window.scrollY - window.innerHeight) > 80;
  };
  window.addEventListener('scroll', onScroll, { passive: true });

  function maybeScroll() {
    if (mediaJustInserted) { mediaJustInserted = false; return; }
    if (!userScrolled) window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  function getOrCreateTextDiv() {
    if (!currentTextDiv) {
      currentTextDiv = document.createElement('div');
      currentTextDiv.className = 'message-body';
      msg.appendChild(currentTextDiv);
    }
    return currentTextDiv;
  }

  function flushTextChunk(text) {
    if (!text) return;
    currentChunk += text;
    fullHistory += text;
    getOrCreateTextDiv().innerHTML = renderHTML(currentChunk);
    maybeScroll();
  }

  async function handleTag(tag) {
    const imgMatch = tag.match(/^\[IMG:([^\]]+)\]$/);
    const sliderMatch = tag.match(/^\[SLIDER:([^\]]+)\]$/);
    const videoMatch = tag.match(/^\[VIDEO:([^\]]+)\]$/);
    if (imgMatch) {
      currentTextDiv = null;
      currentChunk = '';
      const el = buildInlineImage(imgMatch[1].trim());
      if (el) { msg.appendChild(el); mediaJustInserted = true; }
    } else if (sliderMatch) {
      currentTextDiv = null;
      currentChunk = '';
      const sliderName = sliderMatch[1].trim().split('|')[0].trim();
      const sliderCaption = SLIDER_CAPTIONS[sliderName] || null;
      const el = await buildSlider(sliderName, sliderCaption);
      if (el) { msg.appendChild(el); mediaJustInserted = true; }
    } else if (videoMatch) {
      currentTextDiv = null;
      currentChunk = '';
      const el = buildVideoBlock(videoMatch[1].trim());
      if (el) { msg.appendChild(el); mediaJustInserted = true; }
    } else {
      const animMatch = tag.match(/^\[ANIM:([^\]]+)\]$/);
      const gridMatch = tag.match(/^\[GRID:([^\]]+)\]$/);
      if (animMatch) {
        currentTextDiv = null;
        currentChunk = '';
        const el = buildInlineAnim(animMatch[1].trim());
        if (el) { msg.appendChild(el); mediaJustInserted = true; }
      } else if (gridMatch) {
        currentTextDiv = null;
        currentChunk = '';
        const el = await buildGrid(gridMatch[1].trim());
        if (el) { msg.appendChild(el); mediaJustInserted = true; }
      }
    }
    // Q tags are extracted from fullHistory at the end — not handled here
  }

  function findMediaTag(text) {
    const m = text.match(/^([\s\S]*?)(\[(?:IMG|SLIDER|VIDEO|ANIM|GRID):[^\]]+\])([\s\S]*)$/);
    return m ? { before: m[1], tag: m[2], after: m[3] } : null;
  }

  async function processBuffer(isFinal) {
    while (true) {
      const found = findMediaTag(buffer);
      if (!found) {
        if (isFinal) {
          if (buffer) { flushTextChunk(buffer); buffer = ''; }
        } else {
          // Find the last open [ that hasn't been closed — hold everything from there
          const lastOpen = buffer.lastIndexOf('[');
          if (lastOpen === -1) {
            // No open tag — safe to flush all but last 5 chars
            const safe = buffer.slice(0, -5);
            if (safe) { buffer = buffer.slice(safe.length); flushTextChunk(safe); }
          } else {
            // Hold from lastOpen onward — might be a tag still arriving
            const safe = buffer.slice(0, lastOpen);
            if (safe) { buffer = buffer.slice(safe.length); flushTextChunk(safe); }
          }
        }
        break;
      }
      flushTextChunk(found.before);
      buffer = found.after;
      await handleTag(found.tag);
    }
  }

  const decoder = new TextDecoder();
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    const chunk = decoder.decode(value, { stream: true });
    for (const line of chunk.split('\n')) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6);
      if (data === '[DONE]') break;
      try {
        const parsed = JSON.parse(data);
        if (parsed.text) { buffer += parsed.text; await processBuffer(false); }
      } catch(e) {}
    }
  }

  await processBuffer(true);

  // Extract Q tags from fullHistory and render suggestions
  const qTags = [];
  fullHistory.replace(/\[Q\d:([^\]]+)\]/g, (_, q) => qTags.push(q.trim()));

  // Clean last text div from Q tags
  if (currentTextDiv) {
    const clean = currentChunk.replace(/\[Q\d:[^\]]+\]/g, '').trim();
    currentTextDiv.innerHTML = renderHTML(clean);
  }

  if (qTags.length > 0) {
    const sugg = buildSuggestions(qTags);
    if (sugg) { msg.appendChild(sugg); maybeScroll(); }
  }

  window.removeEventListener('scroll', onScroll);

  return fullHistory.replace(/\[Q\d:[^\]]+\]/g, '').trim();
}

// ── Lightbox ─────────────────────────────────────────────────────

let lbImages = [], lbIndex = 0;

function openLightboxAtIndex(src, images, index) {
  lbImages = images && images.length > 0 ? images : [src];
  lbIndex = index !== undefined ? index : Math.max(0, lbImages.indexOf(src));
  const imgEl = document.getElementById('lightbox-img');
  const vidEl = document.getElementById('lightbox-video');
  imgEl.style.display = 'block';
  vidEl.style.display = 'none';
  vidEl.innerHTML = '';
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  const mult = lbImages.length > 1;
  document.getElementById('lb-prev').style.display = mult ? 'block' : 'none';
  document.getElementById('lb-next').style.display = mult ? 'block' : 'none';
}

function openLightbox(src, images) {
  lbImages = images && images.length > 0 ? images : [src];
  lbIndex = Math.max(0, lbImages.indexOf(src));
  const imgEl = document.getElementById('lightbox-img');
  const vidEl = document.getElementById('lightbox-video');
  imgEl.style.display = 'block';
  vidEl.style.display = 'none';
  vidEl.innerHTML = '';
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  const mult = lbImages.length > 1;
  document.getElementById('lb-prev').style.display = mult ? 'block' : 'none';
  document.getElementById('lb-next').style.display = mult ? 'block' : 'none';
}

function openVideoLightbox(v) {
  const imgEl = document.getElementById('lightbox-img');
  const vidEl = document.getElementById('lightbox-video');
  imgEl.style.display = 'none';
  vidEl.style.display = 'block';
  document.getElementById('lb-prev').style.display = 'none';
  document.getElementById('lb-next').style.display = 'none';
  if (v.type === 'youtube') {
    vidEl.innerHTML = `<iframe src="https://www.youtube.com/embed/${v.src}?autoplay=1&rel=0" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
  } else if (v.type === 'mp4') {
    vidEl.innerHTML = `<video src="${v.src}" autoplay controls playsinline></video>`;
  }
  document.getElementById('lightbox').classList.add('open');
}

function updateLightbox() {
  document.getElementById('lightbox-img').src = lbImages[lbIndex];
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  const vidEl = document.getElementById('lightbox-video');
  vidEl.innerHTML = '';
  vidEl.style.display = 'none';
  document.getElementById('lightbox-img').style.display = 'block';
}

document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-prev').addEventListener('click', e => {
  e.stopPropagation();
  lbIndex = (lbIndex - 1 + lbImages.length) % lbImages.length;
  updateLightbox();
});
document.getElementById('lb-next').addEventListener('click', e => {
  e.stopPropagation();
  lbIndex = (lbIndex + 1) % lbImages.length;
  updateLightbox();
});
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox') ||
      e.target === document.getElementById('lightbox-img')) closeLightbox();
});
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') { lbIndex = (lbIndex - 1 + lbImages.length) % lbImages.length; updateLightbox(); }
  if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % lbImages.length; updateLightbox(); }
});
(function() {
  let startX = 0;
  const lb = document.getElementById('lightbox');
  lb.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
  lb.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) < 40) return;
    lbIndex = dx < 0
      ? (lbIndex + 1) % lbImages.length
      : (lbIndex - 1 + lbImages.length) % lbImages.length;
    updateLightbox();
  }, { passive: true });
})();

// ── Send ─────────────────────────────────────────────────────────

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  removePills();
  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  addUserMessage(text);
  history.push({ role: 'user', content: text });
  addTypingIndicator();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });
    removeTypingIndicator();

    if (!res.ok || !res.body) {
      const { body } = createMessageShell('assistant');
      body.innerHTML = renderHTML('Si è verificato un errore. Riprova.');
    } else {
      const reply = await streamAssistantMessage(res.body.getReader());
      history.push({ role: 'assistant', content: reply });
    }
  } catch(err) {
    removeTypingIndicator();
    const { body } = createMessageShell('assistant');
    body.innerHTML = renderHTML('Errore di connessione. Riprova.');
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',

      body: JSON.stringify({
        messages: [{ role: 'user', content: '__OPENING__' }]
      })
    });
    if (res.ok && res.body) {
      const savedHistory = history;
      history = [];

  addPromptPills();
}

function toggleEmailPopup(e) {

// Sparkle animation
(function() {
  const canvas = document.getElementById('sparkle-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  let W, H;

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  function rand(a, b) { return a + Math.random() * (b - a); }
  const COUNT = 40;
  const DOTS = Array.from({length: COUNT}, () => ({
    x: rand(0, W), y: rand(0, H),
    r: rand(0.6, 1.6),
    color: Math.random() > 0.45 ? 'white' : 'pink',
    speed: rand(1.2, 2.8),
    life: rand(0, 1.5),
    maxLife: rand(0.6, 1.8),
  }));

  function respawn(d) {
    d.x = rand(0, W); d.y = rand(0, H);
    d.r = rand(0.6, 1.6);
    d.color = Math.random() > 0.45 ? 'white' : 'pink';
    d.speed = rand(1.2, 2.8);
    d.maxLife = rand(0.6, 1.8);
    d.life = 0;
  }

  let last = performance.now();
  function draw(now) {
    const dt = (now - last) / 1000; last = now;
    ctx.clearRect(0, 0, W, H);
    for (const d of DOTS) {
      d.life += dt * d.speed;
      if (d.life >= d.maxLife) { respawn(d); continue; }
      const half = d.maxLife * 0.5;
      const alpha = d.life < half ? d.life / half : 1 - (d.life - half) / half;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fillStyle = d.color === 'white'
        ? `rgba(255,255,255,${alpha * 0.9})`
        : `rgba(255,91,140,${alpha * 0.95})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
