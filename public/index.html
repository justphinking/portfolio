<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ulisse Poggioni</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inconsolata:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --surface: #ede8dc;
    --border: #d4c8b0;
    --border-strong: #a8bcc8;
    --text: #2c2a24;
    --text-user: #3a82b0;
    --text-muted: #7a6e5e;
    --text-dim: #b0a090;
    --text-label: #c0b098;
    --accent: #3a82b0;
    --line-ai: #6a6458;
    --link: #2a6a9a;
    --serif: 'Playfair Display', serif;
    --mono: 'Inconsolata', monospace;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.6;
  }

  .page {
    max-width: 640px;
    margin: 0 auto;
    padding: 48px 24px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .header-img {
    width: 100%;
    aspect-ratio: 4 / 3;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .header-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .chat {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .message {
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(3px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message-header {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .message-header.user-header {
    justify-content: flex-end;
  }

  .message-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .message-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .message-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-label);
  }

  .message-body {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    border-left: 1px solid var(--line-ai);
    padding-left: 14px;
  }

  .message-body p { margin-bottom: 0.65em; }
  .message-body p:last-child { margin-bottom: 0; }

  .message-body.user-body {
    color: var(--text-user);
    border-left: none;
    padding-left: 0;
    border-right: 1px solid var(--accent);
    padding-right: 14px;
    text-align: right;
  }

  .message-body a {
    color: #4a9a5a;
    text-decoration: underline;
    text-underline-offset: 3px;
    transition: opacity 0.2s;
  }

  .message-body a:hover {
    opacity: 0.7;
  }

  .message-body a.contact {
    color: #d0607a;
  }

  .kw {
    font-weight: 700;
    color: var(--text);
  }




  /* Slider */
  .slider-block {
    margin-top: 14px;
    width: 100%;
    position: relative;
  }

  .slider-track {
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border);
    aspect-ratio: 4 / 3;
    background: var(--surface);
  }

  .slider-track img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.4s ease;
    cursor: zoom-in;
  }

  .slider-track img.active {
    opacity: 1;
  }

  .slider-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 2px 0;
  }

  .slider-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 14px;
    width: 28px;
    height: 28px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .slider-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .slider-dots {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .slider-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--border);
    cursor: pointer;
    transition: background 0.2s;
  }

  .slider-dot.active {
    background: var(--accent);
  }

  .slider-counter {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  /* Inline image */
  .inline-image {
    margin-top: 12px;
    border: 1px solid var(--border);
    display: inline-block;
    max-width: 320px;
    cursor: zoom-in;
  }

  .inline-image img {
    width: 100%;
    display: block;
    transition: opacity 0.2s;
  }

  .inline-image:hover img {
    opacity: 0.85;
  }

  .inline-image-caption {
    padding: 6px 10px;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    border-top: 1px solid var(--border);
  }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .lightbox.open {
    display: flex;
  }

  .lightbox img {
    max-width: 82vw;
    max-height: 88vh;
    object-fit: contain;
    border: 1px solid var(--border);
  }

  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 20px;
    width: 40px;
    height: 40px;
    cursor: pointer;
    transition: all 0.2s;
    z-index: 1001;
  }

  .lightbox-nav:hover { border-color: var(--accent); color: var(--accent); }
  #lb-prev { left: 20px; }
  #lb-next { right: 20px; }

  .lightbox-close {
    position: absolute;
    top: 16px;
    right: 20px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 16px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    transition: all 0.2s;
    z-index: 1001;
  }

  .lightbox-close:hover { border-color: var(--accent); color: var(--accent); }

  /* Cursor */
  .cursor {
    display: inline-block;
    width: 7px;
    height: 13px;
    background: var(--text);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  /* Loading animation */
  .loading-gif {
    width: 150px;
    height: 150px;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--border);
    margin: 4px 0;
  }

  .loading-gif img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .loading-wrap {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 4px 0;
  }

  .loading-label {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    font-style: italic;
  }

  /* Typing dots fallback */
  .typing {
    display: flex;
    gap: 5px;
    padding: 4px 0;
    align-items: center;
  }

  .typing span {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: dot 1.2s ease-in-out infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot {
    0%, 100% { opacity: 0.2; transform: translateY(0); }
    50%       { opacity: 1;   transform: translateY(-2px); }
  }

  .divider {
    width: 100%;
    height: 1px;
    background: var(--border);
  }

  .input-area {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .input-wrapper {
    display: flex;
    align-items: stretch;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    transition: border-color 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: var(--accent);
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 16px;
    line-height: 1.6;
    resize: none;
    max-height: 120px;
    min-height: 20px;
    padding: 10px 14px;
  }

  #user-input::placeholder {
    color: var(--text-dim);
  }

  #send-btn {
    background: transparent;
    border: none;
    border-left: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    padding: 0 16px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  #send-btn:hover:not(:disabled) {
    background: var(--border);
    color: var(--text);
  }

  #send-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .input-hint {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  .prompt-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }

  .prompt-pill {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 14px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .suggestion-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }

  .suggestion-pill {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 13px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    text-align: left;
  }

  .suggestion-pill:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .prompt-pill:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  @media (max-width: 480px) {
    .page { padding: 32px 16px 48px; gap: 24px; }
    #user-input { font-size: 16px; }
  }
</style>
</head>
<body>

<div class="lightbox" id="lightbox">
  <button class="lightbox-nav" id="lb-prev">&#8592;</button>
  <img id="lightbox-img" src="" alt="">
  <button class="lightbox-nav" id="lb-next">&#8594;</button>
  <button class="lightbox-close" id="lb-close">&#x2715;</button>
</div>

<div class="page">

  <div class="header-img">
    <img src="/img/header.jpg" alt="Ulisse Poggioni">
  </div>

  <div class="chat" id="chat"></div>

  <div class="divider"></div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea
        id="user-input"
        placeholder="scrivi qualcosa..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()">invia</button>
    </div>
    <div class="input-hint">↵ invio &nbsp;·&nbsp; shift+↵ nuova riga</div>
  </div>

</div>

<script>
const IMAGES = {
  'coro':    { src: '/img/coro.jpg',    caption: 'Un Coro del Pigneto' },
  'ep':      { src: '/img/ep.jpg',      caption: 'EP "Musica da camera"' },
  'motion':  { src: '/img/motion.jpg',  caption: 'Motion graphics' },
  'ritratto':{ src: '/img/ritratto.jpg',caption: 'Ulisse Poggioni' },
};
const LOADING_GIFS = ['/img/profili/p1.gif','/img/profili/p2.gif','/img/profili/p3.gif','/img/profili/p4.gif','/img/profili/p5.gif'];
const PROFILE_IMG = '/img/profilo.jpg';
const OPENING = `Ciao, sono un'AI con fenomenali poteri cosmici ridotta a rispondere a domande su questo Ulisse Poggioni. Chiedimi pure quello che vuoi, che lavoro fa, cosa ha studiato, le sue competenze. Oppure dimmi di cosa ti occupi tu e partiamo da lì, che dici?`;
const PROMPT_SUGGESTIONS = ['Chi è Ulisse Poggioni?','Che sta succedendo? Come funziona questa cosa?'];

let history = [];
let isLoading = false;

function randomGif() { return LOADING_GIFS[Math.floor(Math.random() * LOADING_GIFS.length)]; }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function sendPrompt(text) { document.getElementById('user-input').value = text; sendMessage(); }

// ── Rendering helpers ────────────────────────────────────────────

function renderHTML(text) {
  let t = text;
  t = t.split('\n').map(line => line.startsWith('- ') ? '\u2013 ' + line.slice(2) : line).join('\n');
  t = t
    .replace(/\[k\](.*?)\[\/k\]/g, '<strong class="kw">$1</strong>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\(mailto:([^)]+)\)/g, '<a href="mailto:$2" class="contact">$2</a>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, (_, label, url) => {
      const isContact = /instagram\.com|t\.me/.test(url);
      return `<a href="${url}" target="_blank" rel="noopener"${isContact ? ' class="contact"' : ''}>${label}</a>`;
    })
    .replace(/(?<!href="|">)(https?:\/\/[^\s<"]+)/g, url => {
      const isContact = /instagram\.com|t\.me/.test(url);
      return `<a href="${url}" target="_blank" rel="noopener"${isContact ? ' class="contact"' : ''}>${url}</a>`;
    })
    .replace(/(\+39[\s\d]{8,})/g, '<span class="contact">$1</span>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  return '<p>' + t + '</p>';
}

function buildInlineImage(key) {
  const img = IMAGES[key];
  if (!img) return null;
  const block = document.createElement('div');
  block.className = 'inline-image';
  block.innerHTML = `<img src="${img.src}" alt="${img.caption}" loading="lazy"><div class="inline-image-caption">${img.caption}</div>`;
  block.addEventListener('click', () => openLightbox(img.src, [img.src]));
  return block;
}

async function buildSlider(name) {
  const srcs = [];
  const exts = ['jpg','jpeg','png','gif','webp'];
  for (let i = 1; i <= 20; i++) {
    let found = false;
    for (const ext of exts) {
      const src = `/img/${name}/${i}.${ext}`;
      try { const r = await fetch(src, { method: 'HEAD' }); if (r.ok) { srcs.push(src); found = true; break; } } catch(e) {}
    }
    if (!found) break;
  }
  if (srcs.length === 0) return null;

  const block = document.createElement('div');
  block.className = 'slider-block';
  const track = document.createElement('div');
  track.className = 'slider-track';
  srcs.forEach((src, idx) => {
    const img = document.createElement('img');
    img.src = src; img.loading = 'lazy';
    if (idx === 0) img.classList.add('active');
    img.addEventListener('click', () => openLightbox(src, srcs));
    track.appendChild(img);
  });

  let current = 0;
  const imgEls = track.querySelectorAll('img');
  const controls = document.createElement('div');
  controls.className = 'slider-controls';
  const prev = document.createElement('button');
  prev.className = 'slider-btn'; prev.textContent = '←';
  const dotsWrap = document.createElement('div');
  dotsWrap.className = 'slider-dots';
  const counter = document.createElement('div');
  counter.className = 'slider-counter';
  counter.textContent = '1 / ' + srcs.length;
  const next = document.createElement('button');
  next.className = 'slider-btn'; next.textContent = '→';

  const dots = srcs.map((_, idx) => {
    const d = document.createElement('div');
    d.className = 'slider-dot' + (idx === 0 ? ' active' : '');
    d.addEventListener('click', () => goTo(idx));
    dotsWrap.appendChild(d);
    return d;
  });

  function goTo(n) {
    imgEls[current].classList.remove('active'); dots[current].classList.remove('active');
    current = (n + srcs.length) % srcs.length;
    imgEls[current].classList.add('active'); dots[current].classList.add('active');
    counter.textContent = (current + 1) + ' / ' + srcs.length;
  }
  prev.addEventListener('click', () => goTo(current - 1));
  next.addEventListener('click', () => goTo(current + 1));
  controls.append(prev, dotsWrap, counter, next);
  block.append(track, controls);
  return block;
}

function buildSuggestions(questions) {
  if (!questions.length) return null;
  const wrap = document.createElement('div');
  wrap.className = 'suggestion-pills';
  questions.forEach(q => {
    const btn = document.createElement('button');
    btn.className = 'suggestion-pill';
    btn.textContent = q;
    btn.onclick = () => { wrap.remove(); sendPrompt(q); };
    wrap.appendChild(btn);
  });
  return wrap;
}

// ── Message construction ─────────────────────────────────────────

function createMessageShell(role) {
  const msg = document.createElement('div');
  msg.className = 'message';
  const header = document.createElement('div');
  header.className = 'message-header' + (role === 'user' ? ' user-header' : '');
  if (role === 'assistant') {
    const av = document.createElement('div');
    av.className = 'message-avatar';
    av.innerHTML = `<img src="${PROFILE_IMG}" alt="Botfolio">`;
    header.appendChild(av);
  }
  const label = document.createElement('div');
  label.className = 'message-label';
  label.textContent = role === 'user' ? 'tu' : 'botfolio';
  header.appendChild(label);
  const body = document.createElement('div');
  body.className = 'message-body' + (role === 'user' ? ' user-body' : '');
  msg.append(header, body);
  document.getElementById('chat').appendChild(msg);
  return { msg, body };
}

function addUserMessage(text) {
  const { body } = createMessageShell('user');
  body.innerHTML = renderHTML(text);
}

// ── Streaming renderer ───────────────────────────────────────────
// Processes text chunk by chunk, flushing inline media tags as they appear.

async function streamAssistantMessage(reader) {
  // Instead of a single body div, we append text nodes and media nodes
  // in sequence directly into msg, so position is always correct.
  const { msg } = createMessageShell('assistant');
  // Remove the empty body div createMessageShell added — we manage nodes ourselves
  const emptyBody = msg.querySelector('.message-body');
  if (emptyBody) emptyBody.remove();

  let buffer = '';
  let currentTextDiv = null;  // the active text div being streamed into
  let currentChunk = '';      // text for the current active div only
  let fullHistory = '';       // complete text for history (all chunks)
  let questions = [];
  let userScrolled = false;

  const onScroll = () => {
    const fromBottom = document.body.scrollHeight - window.scrollY - window.innerHeight;
    userScrolled = fromBottom > 80;
  };
  window.addEventListener('scroll', onScroll, { passive: true });
  function maybeScroll() {
    if (!userScrolled) window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  function getOrCreateTextDiv() {
    if (!currentTextDiv) {
      currentTextDiv = document.createElement('div');
      currentTextDiv.className = 'message-body';
      msg.appendChild(currentTextDiv);
    }
    return currentTextDiv;
  }

  function flushTextChunk(text) {
    if (!text) return;
    currentChunk += text;
    fullHistory += text;
    const div = getOrCreateTextDiv();
    div.innerHTML = renderHTML(currentChunk);
    maybeScroll();
  }

  async function handleTag(tag) {
    const imgMatch = tag.match(/^\[IMG:([^\]]+)\]$/);
    const sliderMatch = tag.match(/^\[SLIDER:([^\]]+)\]$/);
    const qMatch = tag.match(/^\[Q\d:([^\]]+)\]$/);

    if (imgMatch) {
      currentTextDiv = null;
      currentChunk = '';
      const el = buildInlineImage(imgMatch[1].trim());
      if (el) msg.appendChild(el);
      maybeScroll();
    } else if (sliderMatch) {
      currentTextDiv = null;
      currentChunk = '';
      const el = await buildSlider(sliderMatch[1].trim());
      if (el) msg.appendChild(el);
      maybeScroll();
    } else if (qMatch) {
      questions.push(qMatch[2].trim());
    }
  }

  function findMediaTag(text) {
    const m = text.match(/^([\s\S]*?)(\[(?:IMG|SLIDER):[^\]]+\]|\[Q\d:[^\]]+\])([\s\S]*)$/);
    return m ? { before: m[1], tag: m[2], after: m[3] } : null;
  }

  async function processBuffer(isFinal) {
    while (true) {
      const found = findMediaTag(buffer);
      if (!found) {
        if (isFinal) {
          // flush all remaining, including any trailing text after last tag
          if (buffer) { flushTextChunk(buffer); buffer = ''; }
        } else {
          // hold last 20 chars in case a tag is still arriving
          const safe = buffer.slice(0, -20);
          if (safe) { buffer = buffer.slice(safe.length); flushTextChunk(safe); }
        }
        break;
      }
      flushTextChunk(found.before);
      buffer = found.after;
      await handleTag(found.tag);
    }
  }

  const decoder = new TextDecoder();
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    const chunk = decoder.decode(value, { stream: true });
    for (const line of chunk.split('\n')) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6);
      if (data === '[DONE]') break;
      try {
        const parsed = JSON.parse(data);
        if (parsed.text) { buffer += parsed.text; await processBuffer(false); }
      } catch(e) {}
    }
  }

  await processBuffer(true);

  // Re-render last text div cleanly, stripping any leftover Q tags
  const cleanChunk = currentChunk.replace(/\[Q\d:[^\]]+\]/g, '').trim();
  if (currentTextDiv) {
    currentTextDiv.innerHTML = renderHTML(cleanChunk);
  }

  // Append suggestions
  if (questions.length > 0) {
    const sugg = buildSuggestions(questions);
    if (sugg) msg.appendChild(sugg);
    maybeScroll();
  }

  window.removeEventListener('scroll', onScroll);
  maybeScroll();

  return fullHistory.replace(/\[Q\d:[^\]]+\]/g, '').trim();
}

// ── Typing indicator ─────────────────────────────────────────────

function addTypingIndicator() {
  const el = document.createElement('div');
  el.id = 'typing-indicator';
  el.className = 'message';
  const gifSrc = randomGif();
  el.innerHTML = `<div class="message-header"><div class="message-avatar"><img src="${PROFILE_IMG}" alt="Botfolio"></div><div class="message-label">botfolio</div></div><div class="loading-wrap"><div class="loading-gif"><img src="${gifSrc}" alt=""></div><div class="loading-label">ci sto pensando</div></div>`;
  document.getElementById('chat').appendChild(el);
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function removeTypingIndicator() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

// ── Prompt pills ─────────────────────────────────────────────────

function addPromptPills() {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.id = 'prompt-pills';
  wrap.className = 'prompt-pills';
  PROMPT_SUGGESTIONS.forEach(text => {
    const btn = document.createElement('button');
    btn.className = 'prompt-pill';
    btn.textContent = text;
    btn.onclick = () => { wrap.remove(); sendPrompt(text); };
    wrap.appendChild(btn);
  });
  chat.appendChild(wrap);
}

function removePills() {
  const el = document.getElementById('prompt-pills');
  if (el) el.remove();
}

// ── Opening message (non-streamed) ───────────────────────────────

function addOpeningMessage(text) {
  const { msg, body } = createMessageShell('assistant');
  body.innerHTML = renderHTML(text);
  return msg;
}

// ── Lightbox ─────────────────────────────────────────────────────

let lbImages = [], lbIndex = 0;

function openLightbox(src, images) {
  lbImages = images && images.length > 0 ? images : [src];
  lbIndex = lbImages.indexOf(src);
  if (lbIndex < 0) lbIndex = 0;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  const mult = lbImages.length > 1;
  document.getElementById('lb-prev').style.display = mult ? 'block' : 'none';
  document.getElementById('lb-next').style.display = mult ? 'block' : 'none';
}

function updateLightbox() { document.getElementById('lightbox-img').src = lbImages[lbIndex]; }
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-prev').addEventListener('click', e => { e.stopPropagation(); lbIndex = (lbIndex - 1 + lbImages.length) % lbImages.length; updateLightbox(); });
document.getElementById('lb-next').addEventListener('click', e => { e.stopPropagation(); lbIndex = (lbIndex + 1) % lbImages.length; updateLightbox(); });
document.getElementById('lightbox').addEventListener('click', e => { if (e.target === document.getElementById('lightbox') || e.target === document.getElementById('lightbox-img')) closeLightbox(); });
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') { lbIndex = (lbIndex - 1 + lbImages.length) % lbImages.length; updateLightbox(); }
  if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % lbImages.length; updateLightbox(); }
});
(function() {
  let startX = 0;
  const lb = document.getElementById('lightbox');
  lb.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
  lb.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) < 40) return;
    lbIndex = dx < 0 ? (lbIndex + 1) % lbImages.length : (lbIndex - 1 + lbImages.length) % lbImages.length;
    updateLightbox();
  }, { passive: true });
})();

// ── Send message ─────────────────────────────────────────────────

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  removePills();
  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  addUserMessage(text);
  history.push({ role: 'user', content: text });
  addTypingIndicator();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });

    removeTypingIndicator();

    if (!res.ok || !res.body) {
      const { msg, body } = createMessageShell('assistant');
      body.innerHTML = renderHTML('Si è verificato un errore. Riprova.');
    } else {
      const reply = await streamAssistantMessage(res.body.getReader());
      history.push({ role: 'assistant', content: reply });
    }
  } catch (err) {
    removeTypingIndicator();
    const { body } = createMessageShell('assistant');
    body.innerHTML = renderHTML('Errore di connessione. Riprova.');
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

// ── Init ─────────────────────────────────────────────────────────

window.addEventListener('load', () => {
  addOpeningMessage(OPENING);
  addPromptPills();
});
</script>
