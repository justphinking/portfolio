<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ulisse Poggioni</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #313131;
    --surface: #3a3a3a;
    --border: #4a4a4a;
    --border-strong: #a060a8;
    --text: #e8e4dc;
    --text-user: #E983ED;
    --text-muted: #a89e90;
    --text-dim: #686460;
    --text-label: #585450;
    --accent: #E983ED;
    --line-ai: #585450;
    --text-font: 'Lora', serif;
    --ui-font: 'DM Sans', sans-serif;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--text-font);
    font-size: 14px;
    line-height: 1.6;
  }

  .page {
    max-width: 640px;
    margin: 0 auto;
    padding: 48px 24px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .header-img {
    width: 100%;
    aspect-ratio: 4 / 3;
    overflow: hidden;
  }

  .header-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .chat {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .message {
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(3px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message-header {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .message-header.user-header {
    justify-content: flex-end;
  }

  .message-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .message-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .message-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-label);
    font-family: var(--ui-font);
  }

  .message-body {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    border-left: 1px solid var(--line-ai);
    padding-left: 14px;
  }

  .message-body p { margin-bottom: 0.65em; }
  .message-body p:last-child { margin-bottom: 0; }

  .message-body.user-body {
    color: var(--text-user);
    border-left: none;
    padding-left: 0;
    border-right: 1px solid var(--accent);
    padding-right: 14px;
    text-align: right;
  }

  .message-body a {
    color: #6abf7a;
    text-decoration: underline;
    text-underline-offset: 3px;
    transition: opacity 0.2s;
  }

  .message-body a:hover { opacity: 0.7; }

  .message-body a.contact,
  .contact { color: #EBED83; }

  .kw { font-weight: 700; }

  /* Inline Lottie animation */
  .inline-anim {
    margin-top: 12px;
    width: 100%;
    aspect-ratio: 1 / 1;
    max-width: 320px;
    display: block;
  }

  /* Slider */
  .slider-block {
    margin-top: 14px;
    width: 100%;
    position: relative;
  }

  .slider-track {
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border);
    aspect-ratio: 1 / 1;
    background: var(--surface);
  }

  .slider-track img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.4s ease;
    cursor: zoom-in;
  }

  .slider-track img.active { opacity: 1; }

  .slider-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 2px 0;
  }

  .slider-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--ui-font);
    font-size: 14px;
    width: 28px;
    height: 28px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .slider-btn:hover { border-color: var(--accent); color: var(--accent); }

  .slider-dots {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .slider-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--border);
    cursor: pointer;
    transition: background 0.2s;
  }

  .slider-dot.active { background: var(--accent); }

  .slider-counter {
    font-family: var(--ui-font);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  .slider-caption {
    margin-top: 10px;
    font-family: var(--ui-font);
    font-size: 12px;
    line-height: 1.6;
    color: var(--text-muted);
  }

  /* Inline image */
  .inline-image {
    margin-top: 12px;
    display: block;
    width: 100%;
    cursor: zoom-in;
  }

  .inline-image img {
    width: 100%;
    display: block;
    transition: opacity 0.2s;
  }

  .inline-image:hover img { opacity: 0.85; }

  .inline-image-caption {
    font-family: var(--ui-font);
    padding: 6px 0;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  /* Image grid */
  .image-grid {
    margin-top: 14px;
    width: 100%;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  .image-grid-item {
    cursor: zoom-in;
    display: block;
    width: 100%;
  }

  .image-grid-item img {
    width: 100%;
    height: auto;
    display: block;
    transition: opacity 0.2s;
  }

  .image-grid-item:hover img { opacity: 0.8; }

  /* Video cover */
  .video-cover {
    margin-top: 12px;
    display: block;
    width: 100%;
    position: relative;
    cursor: pointer;
  }

  .video-cover img {
    width: 100%;
    display: block;
    transition: opacity 0.2s;
  }

  .video-cover:hover img { opacity: 0.8; }

  .video-play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    border: 2px solid rgba(255,255,255,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    transition: background 0.2s;
  }

  .video-cover:hover .video-play-btn { background: rgba(0,0,0,0.85); }

  .video-play-btn::after {
    content: '';
    display: block;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 10px 0 10px 18px;
    border-color: transparent transparent transparent rgba(255,255,255,0.95);
    margin-left: 4px;
  }

  .video-caption {
    font-family: var(--ui-font);
    padding: 6px 0;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  /* Video lightbox */
  .lightbox-video {
    position: relative;
    width: 90vw;
    max-width: 960px;
    aspect-ratio: 16 / 9;
  }

  .lightbox-video iframe,
  .lightbox-video video {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .lightbox.open { display: flex; }

  .lightbox img {
    max-width: 82vw;
    max-height: 88vh;
    object-fit: contain;
    border: 1px solid var(--border);
  }

  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 20px;
    width: 40px;
    height: 40px;
    cursor: pointer;
    transition: all 0.2s;
    z-index: 1001;
  }

  .lightbox-nav:hover { border-color: var(--accent); color: var(--accent); }
  #lb-prev { left: 20px; }
  #lb-next { right: 20px; }

  .lightbox-close {
    position: absolute;
    top: 16px;
    right: 20px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 16px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    transition: all 0.2s;
    z-index: 1001;
  }

  .lightbox-close:hover { border-color: var(--accent); color: var(--accent); }

  /* Loading */
  .loading-lottie {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.5);
    margin: 4px 0;
    flex-shrink: 0;
  }

  .loading-wrap {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 4px 0;
  }

  .loading-label {
    font-family: var(--ui-font);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    font-style: italic;
  }

  /* Divider */
  .divider {
    width: 100%;
    height: 1px;
    background: var(--border);
  }

  /* Input */
  .input-area {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .input-wrapper {
    display: flex;
    align-items: stretch;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    transition: border-color 0.2s;
  }

  .input-wrapper:focus-within { border-color: var(--accent); }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--text-font);
    font-size: 15px;
    line-height: 1.6;
    resize: none;
    max-height: 120px;
    min-height: 20px;
    padding: 10px 14px;
  }

  #user-input::placeholder { color: var(--text-dim); }

  #send-btn {
    background: transparent;
    border: none;
    border-left: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--ui-font);
    font-size: 12px;
    letter-spacing: 0.06em;
    padding: 0 16px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  #send-btn:hover:not(:disabled) { background: var(--border); color: var(--text); }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .input-hint {
    font-family: var(--ui-font);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  /* Pills */
  .prompt-pills,
  .suggestion-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }

  .suggestion-pills { margin-top: 12px; }

  .prompt-pill,
  .suggestion-pill {
    background: transparent;
    font-family: var(--ui-font);
    font-size: 12px;
    padding: 5px 14px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    text-align: left;
  }

  .prompt-pill { border: 1px solid var(--border-strong); color: var(--text-muted); }
  .suggestion-pill { border: 1px solid var(--border); color: var(--text-muted); }

  .prompt-pill:hover,
  .suggestion-pill:hover { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 480px) {
    .page { padding: 32px 16px 48px; gap: 24px; }
    #user-input { font-size: 16px; }
  }
</style>
</head>
<body>

<div class="lightbox" id="lightbox">
  <button class="lightbox-nav" id="lb-prev">&#8592;</button>
  <img id="lightbox-img" src="" alt="">
  <div class="lightbox-video" id="lightbox-video" style="display:none"></div>
  <button class="lightbox-nav" id="lb-next">&#8594;</button>
  <button class="lightbox-close" id="lb-close">&#x2715;</button>
</div>

<div class="page">

  <div class="header-img" id="lottie-header"></div>

  <div class="chat" id="chat"></div>

  <div class="divider"></div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea
        id="user-input"
        placeholder="scrivi qualcosa..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()">invia</button>
    </div>
    <div class="input-hint">↵ invio &nbsp;·&nbsp; shift+↵ nuova riga</div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
<script>
const IMAGES = {
  'ritratto':              { src: '/img/ritratto.jpg',                  caption: 'Ulisse Poggioni' },
  'ep1':                   { src: '/img/ep1.jpg',                       caption: 'Musica da camera' },
  'ep2':                   { src: '/img/ep2.jpg',                       caption: 'Musica da camera' },
  'webdesign/aiportfolio': { src: '/img/webdesign/aiportfolio.jpg',     caption: 'AI Portfolio — questo sito' },
  'webdesign/cartastraccia':{ src: '/img/webdesign/cartastraccia.jpg',  caption: 'Cartastraccia' },
  'webdesign/lecolonnette':{ src: '/img/webdesign/lecolonnette.jpg',    caption: 'Le Colonnette' },
  'webdesign/unhcr':       { src: '/img/webdesign/unhcr.jpg',           caption: 'UNHCR Magazine' },
};

const VIDEOS = {
  // Kahbum episodi
  'kahbum':         { cover: '/img/video/kahbum.jpg',         type: 'youtube', src: 'NFTqS3Pp4Ck',            caption: 'Kahbum — Salvatore Aranzulla' },
  'kahbum2':        { cover: '/img/video/kahbum2.jpg',        type: 'youtube', src: 'Wo46y3584rY',             caption: 'Kahbum — Tua madre' },
  // Motion graphics
  'bene':           { cover: '/img/video/bene.jpg',           type: 'youtube', src: 'K8z5fZ8Gu6M',             caption: 'Il bene di ti voglio bene' },
  'actionaid':      { cover: '/img/video/actionaid.jpg',      type: 'youtube', src: 'evyLVbg5qUk',             caption: 'Actionaid — Sicuri Per Davvero' },
  // Phink
  'phink':          { cover: '/img/video/phink.jpg',          type: 'mp4',     src: '/video/phink.mp4',         caption: 'Phink' },
  // Content creation
  'frecciarossa':   { cover: '/img/video/frecciarossa.jpg',   type: 'mp4',     src: '/video/frecciarossa.mp4',  caption: 'Frecciarossa — social China' },
  'coro-content':   { cover: '/img/video/coro-content.jpg',   type: 'mp4',     src: '/video/coro.mp4',          caption: 'Un Coro del Pigneto — scouting' },
  'tapsearch':      { cover: '/img/video/tapsearch.jpg',      type: 'mp4',     src: '/video/tapsearch.mp4',     caption: 'Tapsearch — startup digitale' },
  'ng-content':     { cover: '/img/video/ng-content.jpg',     type: 'mp4',     src: '/video/novantacinquegradi.mp4', caption: 'Novantacinque Gradi — social' },
  'padelino-content':{ cover: '/img/video/padelino-content.jpg', type: 'mp4',  src: '/video/padelino.mp4',      caption: 'Il Padelino — social' },
};

const SLIDER_CAPTIONS = {
  'branding/novantacinquegradi': 'Bottega di eccellenze alimentari a Monteverde Vecchio, Roma. Specializzata in mozzarella di bufala e tartufo. Branding completo, declinazioni e allestimento grafico del negozio.',
  'branding/padelino': 'Padel Club di Roma con campi e servizi di alto livello. Branding completo, allestimento grafico del centro e direzione degli shooting fotografici.',
  'branding/tbplace': 'Luxury hotel in centro a Roma. Branding, direzione shooting fotografici, comunicazione digital e space branding.',
};

const PROFILE_IMG = '/img/profilo.jpg';

const OPENING = `Ciao, sono un'AI con fenomenali poteri cosmici ridotta a rispondere a domande su questo Ulisse Poggioni. Chiedimi pure quello che vuoi, che lavoro fa, cosa ha studiato, le sue competenze. Oppure dimmi di cosa ti occupi tu e partiamo da lì, che dici?`;

const PROMPT_SUGGESTIONS = [
  'Chi è Ulisse Poggioni?',
  'Che sta succedendo? Come funziona questa cosa?',
];

let history = [];
let isLoading = false;

function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function sendPrompt(text) { document.getElementById('user-input').value = text; sendMessage(); }

// ── Rendering ────────────────────────────────────────────────────

function renderHTML(text) {
  let t = text;
  // Bullet lines
  t = t.split('\n').map(l => l.startsWith('- ') ? '\u2013 ' + l.slice(2) : l).join('\n');
  t = t
    .replace(/\[k\](.*?)\[\/k\]/g, '<strong class="kw">$1</strong>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    // mailto links
    .replace(/\[([^\]]+)\]\(mailto:([^)]+)\)/g, '<a href="mailto:$2" class="contact">$2</a>')
    // markdown links
    .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, (_, label, url) => {
      const isContact = /instagram\.com/.test(url);
      return `<a href="${url}" target="_blank" rel="noopener"${isContact ? ' class="contact"' : ''}>${label}</a>`;
    })
    // bare URLs not already inside an anchor
    .replace(/(?<!['"=])(https?:\/\/[^\s<"']+)/g, url => {
      const isContact = /instagram\.com/.test(url);
      return `<a href="${url}" target="_blank" rel="noopener"${isContact ? ' class="contact"' : ''}>${url}</a>`;
    })
    // phone numbers
    .replace(/(\+39[\s\d]{8,})/g, '<span class="contact">$1</span>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  return '<p>' + t + '</p>';
}

function extractVideos(text) {
  const keys = [];
  text.replace(/\[VIDEO:([^\]]+)\]/g, (_, k) => keys.push(k.trim()));
  return keys;
}

function buildInlineImage(key) {
  const img = IMAGES[key];
  if (!img) return null;
  const block = document.createElement('div');
  block.className = 'inline-image';
  block.innerHTML = `<img src="${img.src}" alt="${img.caption}" loading="lazy"><div class="inline-image-caption">${img.caption}</div>`;
  block.addEventListener('click', () => openLightbox(img.src, [img.src]));
  return block;
}

function buildVideoBlock(key) {
  const v = VIDEOS[key];
  if (!v) return null;
  const wrap = document.createElement('div');
  wrap.className = 'video-cover';
  const img = document.createElement('img');
  img.src = v.cover;
  img.alt = v.caption;
  img.loading = 'lazy';
  const btn = document.createElement('div');
  btn.className = 'video-play-btn';
  const cap = document.createElement('div');
  cap.className = 'video-caption';
  cap.textContent = v.caption;
  wrap.append(img, btn, cap);
  wrap.addEventListener('click', () => openVideoLightbox(v));
  return wrap;
}

function buildInlineAnim(name) {
  const container = document.createElement('div');
  container.className = 'inline-anim';
  if (typeof lottie !== 'undefined') {
    lottie.loadAnimation({
      container,
      renderer: 'svg',
      loop: true,
      autoplay: true,
      path: `/img/ulisse/${name}/${name}.json`,
      rendererSettings: { preserveAspectRatio: 'xMidYMid meet' }
    });
  }
  return container;
}

async function buildGrid(name) {
  const srcs = [];
  const exts = ['jpg', 'jpeg', 'png', 'webp'];
  for (let i = 1; i <= 30; i++) {
    let found = false;
    for (const ext of exts) {
      const src = `/img/${name}/${i}.${ext}`;
      try {
        const r = await fetch(src, { method: 'HEAD' });
        if (r.ok) { srcs.push(src); found = true; break; }
      } catch(e) {}
    }
    if (!found) break;
  }
  if (srcs.length === 0) return null;

  const grid = document.createElement('div');
  grid.className = 'image-grid';

  srcs.forEach((src, idx) => {
    const item = document.createElement('div');
    item.className = 'image-grid-item';
    const img = document.createElement('img');
    img.src = src;
    img.loading = 'lazy';
    item.appendChild(img);
    item.addEventListener('click', () => openLightboxAtIndex(src, srcs, idx));
    grid.appendChild(item);
  });

  return grid;
}

async function buildSlider(name, caption) {
  const srcs = [];
  const exts = ['jpg', 'jpeg', 'png', 'gif', 'webp'];
  for (let i = 1; i <= 20; i++) {
    let found = false;
    for (const ext of exts) {
      const src = `/img/${name}/${i}.${ext}`;
      try {
        const r = await fetch(src, { method: 'HEAD' });
        if (r.ok) { srcs.push(src); found = true; break; }
      } catch(e) {}
    }
    if (!found) break;
  }
  if (srcs.length === 0) return null;

  const block = document.createElement('div');
  block.className = 'slider-block';
  const track = document.createElement('div');
  track.className = 'slider-track';

  srcs.forEach((src, idx) => {
    const img = document.createElement('img');
    img.src = src;
    img.loading = 'lazy';
    if (idx === 0) img.classList.add('active');
    img.addEventListener('click', (function(s, idx) { return function() { openLightboxAtIndex(s, srcs, idx); }; })(src, idx));
    track.appendChild(img);
  });

  let current = 0;
  const imgEls = track.querySelectorAll('img');
  const controls = document.createElement('div');
  controls.className = 'slider-controls';
  const prev = document.createElement('button');
  prev.className = 'slider-btn'; prev.textContent = '←';
  const dotsWrap = document.createElement('div');
  dotsWrap.className = 'slider-dots';
  const counter = document.createElement('div');
  counter.className = 'slider-counter';
  counter.textContent = '1 / ' + srcs.length;
  const next = document.createElement('button');
  next.className = 'slider-btn'; next.textContent = '→';

  const dots = srcs.map((_, idx) => {
    const d = document.createElement('div');
    d.className = 'slider-dot' + (idx === 0 ? ' active' : '');
    d.addEventListener('click', () => goTo(idx));
    dotsWrap.appendChild(d);
    return d;
  });

  function goTo(n) {
    imgEls[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = (n + srcs.length) % srcs.length;
    imgEls[current].classList.add('active');
    dots[current].classList.add('active');
    counter.textContent = (current + 1) + ' / ' + srcs.length;
  }

  prev.addEventListener('click', () => goTo(current - 1));
  next.addEventListener('click', () => goTo(current + 1));
  controls.append(prev, dotsWrap, counter, next);
  block.append(track, controls);
  if (caption) {
    const cap = document.createElement('div');
    cap.className = 'slider-caption';
    cap.innerHTML = caption;
    block.appendChild(cap);
  }
  return block;
}

function buildSuggestions(questions) {
  if (!questions.length) return null;
  const wrap = document.createElement('div');
  wrap.className = 'suggestion-pills';
  questions.forEach(q => {
    const btn = document.createElement('button');
    btn.className = 'suggestion-pill';
    btn.textContent = q;
    btn.onclick = () => { wrap.remove(); sendPrompt(q); };
    wrap.appendChild(btn);
  });
  return wrap;
}

// ── Message shell ────────────────────────────────────────────────

function createMessageShell(role) {
  const msg = document.createElement('div');
  msg.className = 'message';
  const header = document.createElement('div');
  header.className = 'message-header' + (role === 'user' ? ' user-header' : '');
  if (role === 'assistant') {
    const av = document.createElement('div');
    av.className = 'message-avatar';
    av.innerHTML = `<img src="${PROFILE_IMG}" alt="Botfolio">`;
    header.appendChild(av);
  }
  const label = document.createElement('div');
  label.className = 'message-label';
  label.textContent = role === 'user' ? 'tu' : 'botfolio';
  header.appendChild(label);
  const body = document.createElement('div');
  body.className = 'message-body' + (role === 'user' ? ' user-body' : '');
  msg.append(header, body);
  document.getElementById('chat').appendChild(msg);
  return { msg, body };
}

function addUserMessage(text) {
  const { body } = createMessageShell('user');
  body.innerHTML = renderHTML(text);
}

function addOpeningMessage(text) {
  const { body } = createMessageShell('assistant');
  body.innerHTML = renderHTML(text);
}

// ── Streaming renderer ───────────────────────────────────────────

async function streamAssistantMessage(reader) {
  const { msg } = createMessageShell('assistant');
  // Remove the empty body div — we build nodes inline
  const emptyBody = msg.querySelector('.message-body');
  if (emptyBody) emptyBody.remove();

  let buffer = '';
  let currentTextDiv = null;
  let currentChunk = '';
  let fullHistory = '';
  let userScrolled = false;

  const onScroll = () => {
    userScrolled = (document.body.scrollHeight - window.scrollY - window.innerHeight) > 80;
  };
  window.addEventListener('scroll', onScroll, { passive: true });

  function maybeScroll() {
    if (!userScrolled) window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  function getOrCreateTextDiv() {
    if (!currentTextDiv) {
      currentTextDiv = document.createElement('div');
      currentTextDiv.className = 'message-body';
      msg.appendChild(currentTextDiv);
    }
    return currentTextDiv;
  }

  function flushTextChunk(text) {
    if (!text) return;
    currentChunk += text;
    fullHistory += text;
    getOrCreateTextDiv().innerHTML = renderHTML(currentChunk);
    maybeScroll();
  }

  async function handleTag(tag) {
    const imgMatch = tag.match(/^\[IMG:([^\]]+)\]$/);
    const sliderMatch = tag.match(/^\[SLIDER:([^\]]+)\]$/);
    const videoMatch = tag.match(/^\[VIDEO:([^\]]+)\]$/);
    if (imgMatch) {
      currentTextDiv = null;
      currentChunk = '';
      const el = buildInlineImage(imgMatch[1].trim());
      if (el) msg.appendChild(el);
      maybeScroll();
    } else if (sliderMatch) {
      currentTextDiv = null;
      currentChunk = '';
      const sliderName = sliderMatch[1].trim().split('|')[0].trim();
      const sliderCaption = SLIDER_CAPTIONS[sliderName] || null;
      const el = await buildSlider(sliderName, sliderCaption);
      if (el) msg.appendChild(el);
      maybeScroll();
    } else if (videoMatch) {
      currentTextDiv = null;
      currentChunk = '';
      const el = buildVideoBlock(videoMatch[1].trim());
      if (el) msg.appendChild(el);
      maybeScroll();
    } else {
      const animMatch = tag.match(/^\[ANIM:([^\]]+)\]$/);
      const gridMatch = tag.match(/^\[GRID:([^\]]+)\]$/);
      if (animMatch) {
        currentTextDiv = null;
        currentChunk = '';
        const el = buildInlineAnim(animMatch[1].trim());
        if (el) msg.appendChild(el);
        maybeScroll();
      } else if (gridMatch) {
        currentTextDiv = null;
        currentChunk = '';
        const el = await buildGrid(gridMatch[1].trim());
        if (el) msg.appendChild(el);
        maybeScroll();
      }
    }
    // Q tags are extracted from fullHistory at the end — not handled here
  }

  function findMediaTag(text) {
    const m = text.match(/^([\s\S]*?)(\[(?:IMG|SLIDER|VIDEO|ANIM|GRID):[^\]]+\])([\s\S]*)$/);
    return m ? { before: m[1], tag: m[2], after: m[3] } : null;
  }

  async function processBuffer(isFinal) {
    while (true) {
      const found = findMediaTag(buffer);
      if (!found) {
        if (isFinal) {
          if (buffer) { flushTextChunk(buffer); buffer = ''; }
        } else {
          // Find the last open [ that hasn't been closed — hold everything from there
          const lastOpen = buffer.lastIndexOf('[');
          if (lastOpen === -1) {
            // No open tag — safe to flush all but last 5 chars
            const safe = buffer.slice(0, -5);
            if (safe) { buffer = buffer.slice(safe.length); flushTextChunk(safe); }
          } else {
            // Hold from lastOpen onward — might be a tag still arriving
            const safe = buffer.slice(0, lastOpen);
            if (safe) { buffer = buffer.slice(safe.length); flushTextChunk(safe); }
          }
        }
        break;
      }
      flushTextChunk(found.before);
      buffer = found.after;
      await handleTag(found.tag);
    }
  }

  const decoder = new TextDecoder();
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    const chunk = decoder.decode(value, { stream: true });
    for (const line of chunk.split('\n')) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6);
      if (data === '[DONE]') break;
      try {
        const parsed = JSON.parse(data);
        if (parsed.text) { buffer += parsed.text; await processBuffer(false); }
      } catch(e) {}
    }
  }

  await processBuffer(true);

  // Extract Q tags from fullHistory and render suggestions
  const qTags = [];
  fullHistory.replace(/\[Q\d:([^\]]+)\]/g, (_, q) => qTags.push(q.trim()));

  // Clean last text div from Q tags
  if (currentTextDiv) {
    const clean = currentChunk.replace(/\[Q\d:[^\]]+\]/g, '').trim();
    currentTextDiv.innerHTML = renderHTML(clean);
  }

  if (qTags.length > 0) {
    const sugg = buildSuggestions(qTags);
    if (sugg) { msg.appendChild(sugg); maybeScroll(); }
  }

  window.removeEventListener('scroll', onScroll);
  maybeScroll();

  return fullHistory.replace(/\[Q\d:[^\]]+\]/g, '').trim();
}

// ── Typing indicator ─────────────────────────────────────────────

function addTypingIndicator() {
  const el = document.createElement('div');
  el.id = 'typing-indicator';
  el.className = 'message';
  const lottieContainer = document.createElement('div');
  lottieContainer.className = 'loading-lottie';
  lottieContainer.id = 'thinking-lottie';
  el.innerHTML = `<div class="message-header"><div class="message-avatar"><img src="${PROFILE_IMG}" alt="Botfolio"></div><div class="message-label">botfolio</div></div>`;
  const wrap = document.createElement('div');
  wrap.className = 'loading-wrap';
  wrap.appendChild(lottieContainer);
  const label = document.createElement('div');
  label.className = 'loading-label';
  label.textContent = 'ci sto pensando';
  wrap.appendChild(label);
  el.appendChild(wrap);
  document.getElementById('chat').appendChild(el);
  if (typeof lottie !== 'undefined') {
    lottie.loadAnimation({
      container: lottieContainer,
      renderer: 'svg',
      loop: true,
      autoplay: true,
      path: '/img/thinking/thinking.json',
      rendererSettings: { preserveAspectRatio: 'xMidYMid slice' }
    });
  }
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function removeTypingIndicator() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

// ── Pills ────────────────────────────────────────────────────────

function addPromptPills() {
  const wrap = document.createElement('div');
  wrap.id = 'prompt-pills';
  wrap.className = 'prompt-pills';
  PROMPT_SUGGESTIONS.forEach(text => {
    const btn = document.createElement('button');
    btn.className = 'prompt-pill';
    btn.textContent = text;
    btn.onclick = () => { wrap.remove(); sendPrompt(text); };
    wrap.appendChild(btn);
  });
  document.getElementById('chat').appendChild(wrap);
}

function removePills() {
  const el = document.getElementById('prompt-pills');
  if (el) el.remove();
}

// ── Lightbox ─────────────────────────────────────────────────────

let lbImages = [], lbIndex = 0;

function openLightboxAtIndex(src, images, index) {
  lbImages = images && images.length > 0 ? images : [src];
  lbIndex = index !== undefined ? index : Math.max(0, lbImages.indexOf(src));
  const imgEl = document.getElementById('lightbox-img');
  const vidEl = document.getElementById('lightbox-video');
  imgEl.style.display = 'block';
  vidEl.style.display = 'none';
  vidEl.innerHTML = '';
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  const mult = lbImages.length > 1;
  document.getElementById('lb-prev').style.display = mult ? 'block' : 'none';
  document.getElementById('lb-next').style.display = mult ? 'block' : 'none';
}

function openLightbox(src, images) {
  lbImages = images && images.length > 0 ? images : [src];
  lbIndex = Math.max(0, lbImages.indexOf(src));
  const imgEl = document.getElementById('lightbox-img');
  const vidEl = document.getElementById('lightbox-video');
  imgEl.style.display = 'block';
  vidEl.style.display = 'none';
  vidEl.innerHTML = '';
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  const mult = lbImages.length > 1;
  document.getElementById('lb-prev').style.display = mult ? 'block' : 'none';
  document.getElementById('lb-next').style.display = mult ? 'block' : 'none';
}

function openVideoLightbox(v) {
  const imgEl = document.getElementById('lightbox-img');
  const vidEl = document.getElementById('lightbox-video');
  imgEl.style.display = 'none';
  vidEl.style.display = 'block';
  document.getElementById('lb-prev').style.display = 'none';
  document.getElementById('lb-next').style.display = 'none';
  if (v.type === 'youtube') {
    vidEl.innerHTML = `<iframe src="https://www.youtube.com/embed/${v.src}?autoplay=1&rel=0" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
  } else if (v.type === 'mp4') {
    vidEl.innerHTML = `<video src="${v.src}" autoplay controls playsinline></video>`;
  }
  document.getElementById('lightbox').classList.add('open');
}

function updateLightbox() {
  document.getElementById('lightbox-img').src = lbImages[lbIndex];
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  const vidEl = document.getElementById('lightbox-video');
  vidEl.innerHTML = '';
  vidEl.style.display = 'none';
  document.getElementById('lightbox-img').style.display = 'block';
}

document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-prev').addEventListener('click', e => {
  e.stopPropagation();
  lbIndex = (lbIndex - 1 + lbImages.length) % lbImages.length;
  updateLightbox();
});
document.getElementById('lb-next').addEventListener('click', e => {
  e.stopPropagation();
  lbIndex = (lbIndex + 1) % lbImages.length;
  updateLightbox();
});
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox') ||
      e.target === document.getElementById('lightbox-img')) closeLightbox();
});
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') { lbIndex = (lbIndex - 1 + lbImages.length) % lbImages.length; updateLightbox(); }
  if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % lbImages.length; updateLightbox(); }
});
(function() {
  let startX = 0;
  const lb = document.getElementById('lightbox');
  lb.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
  lb.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) < 40) return;
    lbIndex = dx < 0
      ? (lbIndex + 1) % lbImages.length
      : (lbIndex - 1 + lbImages.length) % lbImages.length;
    updateLightbox();
  }, { passive: true });
})();

// ── Send ─────────────────────────────────────────────────────────

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  removePills();
  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  addUserMessage(text);
  history.push({ role: 'user', content: text });
  addTypingIndicator();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });
    removeTypingIndicator();

    if (!res.ok || !res.body) {
      const { body } = createMessageShell('assistant');
      body.innerHTML = renderHTML('Si è verificato un errore. Riprova.');
    } else {
      const reply = await streamAssistantMessage(res.body.getReader());
      history.push({ role: 'assistant', content: reply });
    }
  } catch(err) {
    removeTypingIndicator();
    const { body } = createMessageShell('assistant');
    body.innerHTML = renderHTML('Errore di connessione. Riprova.');
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

// ── Init ─────────────────────────────────────────────────────────

window.addEventListener('load', () => {
  if (typeof lottie !== 'undefined') {
    lottie.loadAnimation({
      container: document.getElementById('lottie-header'),
      renderer: 'svg',
      loop: true,
      autoplay: true,
      path: '/img/header/header_1.json',
      rendererSettings: { preserveAspectRatio: 'xMidYMid slice' }
    });
  }
  addOpeningMessage(OPENING);
  addPromptPills();
});
