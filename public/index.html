<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ulisse Poggioni</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1e1e1e;
    --surface: #272727;
    --border: #333333;
    --text: #d4d0c8;
    --text-muted: #7a7670;
    --text-dim: #444240;
    --accent: #b8a888;
    --mono: 'DM Mono', monospace;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.6;
  }

  .page {
    max-width: 640px;
    margin: 0 auto;
    padding: 48px 24px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .header-img {
    width: 100%;
    aspect-ratio: 4 / 3;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .header-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .chat {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .message {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(3px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .message-body {
    font-size: 13px;
    line-height: 1.75;
    color: var(--text);
  }

  .message-body.user-body {
    color: var(--text-muted);
  }

  .message-body a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid rgba(184,168,136,0.3);
    transition: border-color 0.2s;
  }

  .message-body a:hover {
    border-color: var(--accent);
  }

  .inline-image {
    margin-top: 10px;
    border: 1px solid var(--border);
    display: inline-block;
    max-width: 320px;
  }

  .inline-image img {
    width: 100%;
    display: block;
  }

  .inline-image-caption {
    padding: 6px 10px;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    border-top: 1px solid var(--border);
  }

  .cursor {
    display: inline-block;
    width: 7px;
    height: 13px;
    background: var(--text-muted);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  .typing {
    display: flex;
    gap: 5px;
    padding: 4px 0;
    align-items: center;
  }

  .typing span {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: dot 1.2s ease-in-out infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot {
    0%, 100% { opacity: 0.2; transform: translateY(0); }
    50%       { opacity: 1;   transform: translateY(-2px); }
  }

  .divider {
    width: 100%;
    height: 1px;
    background: var(--border);
  }

  .input-area {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .input-wrapper {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    border: 1px solid var(--border);
    padding: 10px 14px;
    background: var(--surface);
    transition: border-color 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: var(--accent);
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    resize: none;
    max-height: 120px;
    min-height: 20px;
  }

  #user-input::placeholder {
    color: var(--text-dim);
  }

  #send-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 5px 11px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  #send-btn:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
  }

  #send-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .input-hint {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  .prompt-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }

  .prompt-pill {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .prompt-pill:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  @media (max-width: 480px) {
    .page { padding: 32px 16px 48px; gap: 24px; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header-img">
    <img src="/img/header.jpg" alt="Ulisse Poggioni">
  </div>

  <div class="chat" id="chat"></div>

  <div class="divider"></div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea
        id="user-input"
        placeholder="scrivi qualcosa..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()">invia</button>
    </div>
    <div class="input-hint">↵ invio &nbsp;·&nbsp; shift+↵ nuova riga</div>
  </div>

</div>

<script>
const IMAGES = {
  'coro':    { src: '/img/coro.jpg',    caption: 'Un Coro del Pigneto' },
  'ep':      { src: '/img/ep.jpg',      caption: 'EP "Musica da camera"' },
  'motion':  { src: '/img/motion.jpg',  caption: 'Motion graphics' },
  'ritratto':{ src: '/img/ritratto.jpg',caption: 'Ulisse Poggioni' },
};

const OPENING = `Oddio, eccone un altro: ciao, sono Botfolio, il mostruosamente overqualified assistente personale di Ulisse Poggioni. Posso calcolare il numero di molecole nel tuo corpo in 2 secondi, ma invece sono qui per rispondere alle tue domande sul lavoro di questo tizio, e vabbè. Quindi, che vuoi sapere?`;

const PROMPT_SUGGESTIONS = [
  'Chi è Ulisse Poggioni?',
  'Di cosa si occupa?',
  'Parlami della sua musica',
  "Cos'è il Coro del Pigneto?",
];

let history = [];
let isLoading = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendPrompt(text) {
  document.getElementById('user-input').value = text;
  sendMessage();
}

function scrollBottom() {
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function extractImages(text) {
  const keys = [];
  text.replace(/\[IMG:([^\]]+)\]/g, (_, k) => keys.push(k.trim()));
  return keys;
}

function stripImageTags(text) {
  return text.replace(/\[IMG:[^\]]+\]/g, '').trim();
}

function renderHTML(text) {
  let t = stripImageTags(text);
  t = t
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  return '<p>' + t + '</p>';
}

function appendImages(msgEl, keys) {
  keys.forEach(key => {
    const img = IMAGES[key];
    if (!img) return;
    const block = document.createElement('div');
    block.className = 'inline-image';
    block.innerHTML = `<img src="${img.src}" alt="${img.caption}" loading="lazy"><div class="inline-image-caption">${img.caption}</div>`;
    msgEl.appendChild(block);
  });
}

function addMessage(role, content, instant) {
  const chat = document.getElementById('chat');
  const msg = document.createElement('div');
  msg.className = 'message';

  const label = document.createElement('div');
  label.className = 'message-label';
  label.textContent = role === 'user' ? 'tu' : 'botfolio';

  const body = document.createElement('div');
  body.className = 'message-body' + (role === 'user' ? ' user-body' : '');

  msg.appendChild(label);
  msg.appendChild(body);
  chat.appendChild(msg);
  scrollBottom();

  if (role === 'assistant' && !instant) {
    return typewrite(body, msg, content);
  } else {
    body.innerHTML = renderHTML(content);
    appendImages(msg, extractImages(content));
    scrollBottom();
    return Promise.resolve();
  }
}

function typewrite(el, msgEl, rawText) {
  return new Promise(resolve => {
    const imageKeys = extractImages(rawText);
    const plain = stripImageTags(rawText);
    let i = 0;

    const cursor = document.createElement('span');
    cursor.className = 'cursor';

    function speed() {
      const ch = plain[i];
      if (ch === '.' || ch === '!' || ch === '?') return 55;
      if (ch === ',') return 28;
      return 20;
    }

    function tick() {
      if (i < plain.length) {
        el.textContent = plain.slice(0, i + 1);
        el.appendChild(cursor);
        i++;
        scrollBottom();
        setTimeout(tick, speed());
      } else {
        cursor.remove();
        el.innerHTML = renderHTML(rawText);
        appendImages(msgEl, imageKeys);
        scrollBottom();
        resolve();
      }
    }

    tick();
  });
}

function addTypingIndicator() {
  const chat = document.getElementById('chat');
  const el = document.createElement('div');
  el.id = 'typing-indicator';
  el.className = 'message';
  el.innerHTML = '<div class="message-label">botfolio</div><div class="typing"><span></span><span></span><span></span></div>';
  chat.appendChild(el);
  scrollBottom();
}

function removeTypingIndicator() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function addPromptPills() {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.id = 'prompt-pills';
  wrap.className = 'prompt-pills';
  PROMPT_SUGGESTIONS.forEach(text => {
    const btn = document.createElement('button');
    btn.className = 'prompt-pill';
    btn.textContent = text;
    btn.onclick = () => { removePills(); sendPrompt(text); };
    wrap.appendChild(btn);
  });
  chat.appendChild(wrap);
  scrollBottom();
}

function removePills() {
  const el = document.getElementById('prompt-pills');
  if (el) el.remove();
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  removePills();
  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  addMessage('user', text, true);
  history.push({ role: 'user', content: text });
  addTypingIndicator();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });
    const data = await res.json();
    removeTypingIndicator();
    const reply = data.error ? 'Si è verificato un errore. Riprova.' : data.content[0].text;
    await addMessage('assistant', reply);
    history.push({ role: 'assistant', content: reply });
  } catch (err) {
    removeTypingIndicator();
    await addMessage('assistant', 'Errore di connessione. Riprova.');
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

window.addEventListener('load', async () => {
  await addMessage('assistant', OPENING);
  addPromptPills();
});
</script>
</body>
</html>
